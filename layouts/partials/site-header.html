<header class="site-header">
  <div class="site-header-row">
    {{- if .IsHome }}
    <h1 class="site-title">{{ site.Title }}</h1>
    {{- else }}
    <a class="site-title" href="{{ .Site.Home.RelPermalink }}">{{ site.Title }}</a>
    {{- end }}
    <button class="theme-toggle" type="button" data-theme-toggle data-light-label="{{ i18n "theme_light" }}" aria-label="{{ i18n "theme_dark" }}" title="{{ i18n "theme_dark" }}"><span class="theme-glyph" aria-hidden="true"></span></button>
  </div>
</header>
