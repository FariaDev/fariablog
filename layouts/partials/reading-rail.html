<aside class="reading-rail" aria-label="{{ i18n "reading_context" }}" data-reading-rail>
  <span class="rail-position" data-rail-position>—</span>
  <strong data-current-section>{{ i18n "summary_label" }}</strong>
  <span class="rail-progress-label">{{ i18n "progress" }}</span>
  <span class="rail-progress" aria-hidden="true"><span data-progress-fill></span></span>
  <output data-reading-progress aria-live="polite">0%</output>
  <a href="#main-content">↑ {{ i18n "back_to_top" }}</a>
</aside>
