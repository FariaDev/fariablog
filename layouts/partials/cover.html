{{- with .cxt }}
  {{- if and .Params.cover.image (not $.isHidden) }}
    <figure class="entry-cover">
      {{- $loading := cond $.IsSingle "eager" "lazy" }}
      {{- $addLink := and site.Params.cover.linkFullImages $.IsSingle }}
      {{- $alt := .Params.cover.alt | default .Params.cover.caption | plainify | htmlUnescape }}
      {{- $responsiveImages := (.Params.cover.responsiveImages | default site.Params.cover.responsiveImages) | default true }}
      {{- $processableFormats := slice "jpg" "jpeg" "png" "tif" "bmp" "gif" "webp" }}
      {{- $cover := (.Resources.ByType "image").GetMatch (printf "*%s*" .Params.cover.image) }}
      {{- if not $cover }}
        {{- $coverPath := strings.TrimPrefix "/" .Params.cover.image }}
        {{- range resources.Match "images/*" }}
          {{- if eq .Name (printf "/%s" $coverPath) }}
            {{- $cover = . }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- $imgdl := .Params.cover.image | absURL }}
      {{- with $cover }}
        {{- $imgdl = .Permalink }}
      {{- end }}

      {{- if $addLink }}<a href="{{ $imgdl }}" target="_blank" rel="noopener noreferrer">{{ end }}
      {{- if and $cover (in $processableFormats $cover.MediaType.SubType) }}
        {{- if and hugo.IsExtended $responsiveImages }}
          {{- $sizes := slice "360" "480" "720" "1080" "1500" }}
          {{- $srcset := slice }}
          {{- range $size := $sizes }}
            {{- if ge $cover.Width (int $size) }}
              {{- $variant := $cover.Resize (printf "%sx webp" $size) }}
              {{- $srcset = $srcset | append (printf "%s %sw" $variant.RelPermalink $size) }}
            {{- end }}
          {{- end }}
          {{- $srcset = $srcset | append (printf "%s %dw" $cover.RelPermalink $cover.Width) }}
          <img loading="{{ $loading }}" src="{{ $cover.RelPermalink }}" srcset="{{ delimit $srcset ", " }}" sizes="(min-width: 768px) 720px, 100vw" width="{{ $cover.Width }}" height="{{ $cover.Height }}" alt="{{ $alt | transform.HTMLEscape }}">
        {{- else }}
          <img loading="{{ $loading }}" src="{{ $cover.RelPermalink }}" width="{{ $cover.Width }}" height="{{ $cover.Height }}" alt="{{ $alt | transform.HTMLEscape }}">
        {{- end }}
      {{- else }}
        <img loading="{{ $loading }}" src="{{ $imgdl }}" alt="{{ $alt | transform.HTMLEscape }}">
      {{- end }}
      {{- if $addLink }}</a>{{ end }}

      {{- if $.IsSingle }}
        {{- with .Params.cover.caption }}<figcaption>{{ . | markdownify }}</figcaption>{{ end }}
      {{- end }}
    </figure>
  {{- end }}
{{- end }}
