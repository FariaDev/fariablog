baseURL = "https://fariablog.com/"  # Mude se for testar em subdomínio primeiro
languageCode = "pt-br"  # Default: Português
title = "FariaBlog"

# Descrição global do site (SEO)
description = "Um blog sobre filosofia, literatura, neurociência e reflexões sobre educação. Compartilhando insights e descobertas através da leitura e do pensamento crítico."

# Keywords globais (SEO)
keywords = ["filosofia", "literatura", "neurociência", "educação", "leitura", "reflexões", "blog", "pensamento crítico"]

theme = "PaperMod"

defaultContentLanguage = "pt-br"
defaultContentLanguageInSubdir = true

[outputs]
home = ["HTML", "RSS", "JSON"]  # Necessário para Search

[taxonomies]
tag = "tags"  # Ativa Tags (use em front matter de posts: tags = ["tag1", "tag2"])

[languages]
  [languages.pt-br]
    contentDir = "content/pt-br"
    languageName = "🇧🇷 Pt-Br"
    weight = 1
    title = "FariaBlog"
    [languages.pt-br.menu]
      [[languages.pt-br.menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search/"
        weight = 10
      [[languages.pt-br.menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 20
      [[languages.pt-br.menu.main]]
        identifier = "archives"
        name = "Archive"
        url = "/archives/"
        weight = 30
      [[languages.pt-br.menu.main]]
        identifier = "contact"
        name = "Contato"
        url = "/contact/"
        weight = 40  # Ajuste o weight para ordem (maior = depois no menu)
      [[languages.pt-br.menu.main]]
        identifier = "books"
        name = "Livros Lidos"
        url = "/books/"
        weight = 50

    [languages.pt-br.params]
      disqusShortname = "fariablog"  # Para comentários em pt-br
      [languages.pt-br.params.editPost]
        URL = "https://github.com/FariaDev/fariablog/edit/main/content/pt-br"
        Text = "Sugira Edições"  # Texto em português
        appendFilePath = true  # Adiciona o caminho do arquivo do post ao link
      [languages.pt-br.params.homeInfoParams]
        Title = "Bem-vindo ao meu universo de ideias"
        Content = "Um jovem de 18 anos compartilhando insights, reflexões e descobertas. Um espaço para explorar o que estou lendo, estudando e pensando no momento."

  [languages.en]
    contentDir = "content/en"
    languageName = "🇺🇸 En"
    weight = 2
    title = "FariaBlog"
    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search/"
        weight = 10
      [[languages.en.menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 20
      [[languages.en.menu.main]]
        identifier = "archives"
        name = "Archive"
        url = "/archives/"
        weight = 30
      [[languages.en.menu.main]]
        identifier = "contact"
        name = "Contact"
        url = "/contact/"
        weight = 40
      [[languages.en.menu.main]]
        identifier = "books"
        name = "Books Read"
        url = "/books/"
        weight = 50

    [languages.en.params]
      disqusShortname = "fariablog"  # Para comentários em en (pode ajustar se quiser um shortname diferente)
      [languages.en.params.editPost]
        URL = "https://github.com/FariaDev/fariablog/edit/main/content/en"
        Text = "Suggest Changes"  # Texto em inglês
        appendFilePath = true  # Adiciona o caminho do arquivo do post ao link
      [languages.en.params.homeInfoParams]
        Title = "Welcome to my universe of ideas"
        Content = "A 18-year-old sharing insights, reflections, and discoveries. A space to explore what I'm reading, studying, and thinking about right now."  # Tradução sugerida; ajuste se quiser

[params]
  # Fallback de produção para evitar meta robots "noindex" em builds sem flag explícita
  env = "production"
  # SEO global (consumido por layouts/partials/head.html e schema)
  description = "Um blog sobre filosofia, literatura, neurociência e reflexões sobre educação. Compartilhando insights e descobertas através da leitura e do pensamento crítico."
  keywords = ["filosofia", "literatura", "neurociência", "educação", "leitura", "reflexões", "blog", "pensamento crítico"]
  author = "Lucas"
  displayFullLangName = true
  ShowShareButtons = true  # Ativado conforme sua preferência anterior
  ShowReadingTime = true
  ShowToc = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  customCSS = ["extended/overrides.css"]  # Para CSS personalizado

  # Search config (global, aplica a todos os idiomas)
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  # Assets (global)
  # Nota: Favicons são gerenciados via layouts/partials/extend_head.html
  # Desabilitando favicons do tema para evitar duplicação
  [params.assets]
    # favicon = "/favicon.ico"  # Desabilitado - usando extend_head.html
    # favicon16x16 = "/favicon-16x16.png"  # Arquivo não existe
    # favicon32x32 = "/favicon-32x32.png"  # Arquivo não existe
    # apple_touch_icon = "/apple-touch-icon.png"  # Desabilitado - usando extend_head.html
    # safari_pinned_tab = "/safari-pinned-tab.svg"  # Arquivo não existe

mainSections = ["posts"]
