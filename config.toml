# Configuração principal do FariaBlog — interface mínima.
baseURL = "https://fariablog.com/"
title = "FariaBlog"
defaultContentLanguage = "pt-br"
defaultContentLanguageInSubdir = true
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[taxonomies]
  tag = "tags"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"

[params]
  authorName = "Lucas Faria"
  description = "Um blog sobre filosofia, literatura, neurociência e reflexões sobre educação. Compartilhando insights e descobertas através da leitura e do pensamento crítico."
  keywords = ["filosofia", "literatura", "neurociência", "educação", "leitura", "reflexões", "blog", "pensamento crítico"]
  showToc = true
  mainSections = ["posts"]
  rssLimit = 20
  editBaseURL = "https://github.com/FariaDev/fariablog/edit/main"
  images = ["/og/fariablog.jpg"]

[languages]
  [languages.pt-br]
    contentDir = "content/pt-br"
    weight = 1
    title = "FariaBlog"
    [languages.pt-br.params]
      locale = "pt-BR"
      languageLabel = "Português"
      description = "Um blog sobre filosofia, literatura, neurociência e reflexões sobre educação. Compartilhando insights e descobertas através da leitura e do pensamento crítico."
      keywords = ["filosofia", "literatura", "neurociência", "educação", "leitura", "reflexões", "blog", "pensamento crítico"]
      dateFormat = "02/01/2006"
      homeInfoContent = "Compartilhando insights, reflexões e descobertas. Um espaço para explorar o que estou lendo, estudando e pensando no momento."
      [languages.pt-br.params.editPost]
        contentDir = "content/pt-br"

  [languages.en]
    contentDir = "content/en"
    weight = 2
    title = "FariaBlog"
    [languages.en.params]
      locale = "en-US"
      languageLabel = "English"
      description = "A blog about philosophy, literature, neuroscience, and reflections on education. Sharing insights and discoveries through reading and critical thinking."
      keywords = ["philosophy", "literature", "neuroscience", "education", "reading", "reflections", "blog", "critical thinking"]
      dateFormat = "Jan 02, 2006"
      homeInfoContent = "Sharing insights, reflections, and discoveries. A space to explore what I'm reading, studying, and thinking about right now."
      [languages.en.params.editPost]
        contentDir = "content/en"

enableRobotsTXT = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[pagination]
  pagerSize = 10

[module]
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "static/images"
    target = "assets/images"
